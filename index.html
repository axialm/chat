<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AxiaLM - AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', // Enables toggleable dark mode via a class on the HTML tag
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s ease;
        }

        /* Clean, unobtrusive scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background-color: #e2e0da;
            border-radius: 10px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background-color: #4a4a4a;
        }
        ::-webkit-scrollbar-thumb:hover {
            background-color: #cfcdc6;
        }
        .dark ::-webkit-scrollbar-thumb:hover {
            background-color: #666666;
        }

        /* Gemini-style input shadow */
        .floating-input {
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
            transition: all 0.3s ease;
        }
        .dark .floating-input {
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .floating-input:focus-within {
            box-shadow: 0 12px 48px rgba(99, 102, 241, 0.12);
            border-color: #e0e7ff;
        }
        .dark .floating-input:focus-within {
            box-shadow: 0 12px 48px rgba(99, 102, 241, 0.2);
            border-color: #4f46e5;
        }

        /* Gradient text for AxiaLM brand */
        .text-gradient {
            background: linear-gradient(135deg, #4f46e5 0%, #9333ea 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Typing animation */
        .typing-dot {
            animation: typing 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Smooth reveal for messages */
        .message-appear {
            animation: appear 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(10px);
        }
        
        @keyframes appear {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="h-screen w-full flex overflow-hidden bg-[#fcfbf9] dark:bg-[#1a1a1a] text-gray-800 dark:text-gray-200">

    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 bg-[#f3f2ee] dark:bg-[#202020] border-r border-[#e6e4df] dark:border-[#333] flex-col hidden md:flex transition-all duration-300 z-20 shrink-0">
        <div class="p-4">
            <button onclick="startNewChat()" class="w-full flex items-center gap-2 bg-white dark:bg-[#2d2d2d] border border-[#e6e4df] dark:border-[#444] hover:bg-gray-50 dark:hover:bg-[#383838] text-sm font-medium px-4 py-2.5 rounded-lg shadow-sm transition-colors text-gray-800 dark:text-gray-200">
                <i data-lucide="plus" class="w-4 h-4"></i>
                New Chat
            </button>
        </div>
        
        <div class="flex-1 overflow-y-auto px-3 py-2">
            <div class="text-xs font-semibold text-gray-500 dark:text-gray-400 mb-3 px-2">Recent</div>
            <!-- Dynamic Chat History List -->
            <div id="chat-history-list" class="space-y-1">
                <!-- Session items will be injected here via JS -->
            </div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col relative h-full w-full bg-[#fcfbf9] dark:bg-[#1a1a1a]">
        
        <!-- Top Navigation -->
        <header class="flex items-center justify-between p-4 bg-[#fcfbf9]/80 dark:bg-[#1a1a1a]/80 backdrop-blur-md absolute top-0 w-full z-10">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="p-2 md:hidden hover:bg-gray-200 dark:hover:bg-gray-800 rounded-md text-gray-600 dark:text-gray-300 transition-colors">
                    <i data-lucide="menu" class="w-5 h-5"></i>
                </button>
                <div class="flex items-center gap-2 font-semibold text-lg px-2 py-1 rounded-md">
                    AxiaLM <span class="text-xs bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300 px-2 py-0.5 rounded-full ml-1">1 Mini</span>
                </div>
            </div>
            
            <!-- Dark Mode Toggle -->
            <button id="theme-toggle" class="p-2 hover:bg-gray-200 dark:hover:bg-gray-800 rounded-full text-gray-500 dark:text-gray-400 transition-colors">
                <i id="theme-icon-light" data-lucide="sun" class="w-5 h-5 hidden"></i>
                <i id="theme-icon-dark" data-lucide="moon" class="w-5 h-5"></i>
            </button>
        </header>

        <!-- Chat Container -->
        <div id="chat-container" class="flex-1 overflow-y-auto pt-20 pb-36 px-4 md:px-8 flex flex-col items-center scroll-smooth">
            
            <!-- Greeting Screen -->
            <div id="greeting-screen" class="w-full max-w-3xl flex flex-col justify-center h-full pb-20 transition-opacity duration-500">
                <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 flex items-center justify-center mb-6 shadow-lg shadow-purple-200 dark:shadow-purple-900/20">
                    <i data-lucide="sparkles" class="w-6 h-6 text-white"></i>
                </div>
                <h1 class="text-4xl md:text-5xl font-semibold mb-2 tracking-tight">
                    <span class="text-gradient">Hello, there.</span>
                </h1>
                <p class="text-gray-500 dark:text-gray-400 text-xl md:text-2xl mb-10">How can I help you today?</p>
                
                <!-- Suggestion Chips -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                    <button onclick="fillInput('Explain how photosynthesis works in simple terms.')" class="text-left p-4 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-[#252525] hover:border-purple-300 dark:hover:border-purple-500 hover:shadow-md transition-all group">
                        <i data-lucide="leaf" class="w-5 h-5 text-emerald-500 mb-3 group-hover:scale-110 transition-transform"></i>
                        <div class="font-medium text-gray-700 dark:text-gray-200 text-sm">Explain a concept</div>
                        <div class="text-gray-400 dark:text-gray-500 text-xs mt-1">Photosynthesis in simple terms</div>
                    </button>
                    <button onclick="fillInput('Help me plan a study schedule for my upcoming exams.')" class="text-left p-4 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-[#252525] hover:border-purple-300 dark:hover:border-purple-500 hover:shadow-md transition-all group">
                        <i data-lucide="calendar" class="w-5 h-5 text-blue-500 mb-3 group-hover:scale-110 transition-transform"></i>
                        <div class="font-medium text-gray-700 dark:text-gray-200 text-sm">Create a plan</div>
                        <div class="text-gray-400 dark:text-gray-500 text-xs mt-1">Study schedule for exams</div>
                    </button>
                    <button onclick="fillInput('Write a creative short story about a time traveler.')" class="text-left p-4 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-[#252525] hover:border-purple-300 dark:hover:border-purple-500 hover:shadow-md transition-all group">
                        <i data-lucide="pen-tool" class="w-5 h-5 text-pink-500 mb-3 group-hover:scale-110 transition-transform"></i>
                        <div class="font-medium text-gray-700 dark:text-gray-200 text-sm">Draft a story</div>
                        <div class="text-gray-400 dark:text-gray-500 text-xs mt-1">About a time traveler</div>
                    </button>
                </div>
            </div>

            <!-- Messages will be appended here -->
            <div id="messages-wrapper" class="w-full max-w-3xl flex flex-col gap-6 hidden"></div>

        </div>

        <!-- Input Area -->
        <div class="absolute bottom-0 w-full bg-gradient-to-t from-[#fcfbf9] via-[#fcfbf9] dark:from-[#1a1a1a] dark:via-[#1a1a1a] to-transparent pt-12 pb-6 px-4 md:px-8 z-10">
            <div class="max-w-3xl mx-auto relative">
                <form id="chat-form" class="floating-input bg-white dark:bg-[#252525] border border-gray-200 dark:border-gray-700 rounded-[32px] flex items-end p-2 pl-4 transition-all">

                    <textarea id="chat-input" rows="1" placeholder="Ask AxiaLM..." class="flex-1 max-h-40 min-h-[44px] bg-transparent outline-none px-3 py-3 text-[15px] resize-none text-gray-800 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 leading-relaxed overflow-hidden"></textarea>
                    
                    <button type="submit" id="submit-btn" class="p-2.5 bg-black dark:bg-white text-white dark:text-black hover:bg-gray-800 dark:hover:bg-gray-200 rounded-full transition-colors mb-0.5 shrink-0 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center">
                        <i data-lucide="arrow-up" class="w-5 h-5"></i>
                    </button>
                </form>
                <div class="text-center mt-3 text-xs text-gray-400 dark:text-gray-500 font-medium">
                    AxiaLM may display inaccurate info, so double-check its responses.
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- Theme Management ---
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIconLight = document.getElementById('theme-icon-light');
        const themeIconDark = document.getElementById('theme-icon-dark');

        // Check cache for theme on load
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            themeIconDark.classList.add('hidden');
            themeIconLight.classList.remove('hidden');
        } else {
            document.documentElement.classList.remove('dark');
        }

        // Toggle Theme
        themeToggleBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            if (document.documentElement.classList.contains('dark')) {
                localStorage.theme = 'dark';
                themeIconDark.classList.add('hidden');
                themeIconLight.classList.remove('hidden');
            } else {
                localStorage.theme = 'light';
                themeIconLight.classList.add('hidden');
                themeIconDark.classList.remove('hidden');
            }
        });

        // --- Chat & UI Management ---
        lucide.createIcons();

        const chatForm = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');
        const chatContainer = document.getElementById('chat-container');
        const messagesWrapper = document.getElementById('messages-wrapper');
        const greetingScreen = document.getElementById('greeting-screen');
        const submitBtn = document.getElementById('submit-btn');
        const sidebar = document.getElementById('sidebar');
        const chatHistoryList = document.getElementById('chat-history-list');

        let isFirstMessage = true;
        let currentSessionId = null;
        let sessions = JSON.parse(localStorage.getItem('axia_sessions')) || [];

        // Auto-resize textarea
        chatInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 160) + 'px';
            
            if (this.scrollHeight > 160) {
                this.style.overflowY = 'auto';
            } else {
                this.style.overflowY = 'hidden';
            }
            
            submitBtn.disabled = this.value.trim().length === 0;
        });

        chatInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (this.value.trim().length > 0) chatForm.dispatchEvent(new Event('submit'));
            }
        });

        function fillInput(text) {
            chatInput.value = text;
            chatInput.dispatchEvent(new Event('input'));
            chatInput.focus();
        }

        function toggleSidebar() {
            sidebar.classList.toggle('hidden');
            sidebar.classList.toggle('absolute');
            sidebar.classList.toggle('h-full');
            sidebar.classList.toggle('shadow-2xl');
        }

        // --- Session Management ---
        function saveSessions() {
            localStorage.setItem('axia_sessions', JSON.stringify(sessions));
            renderSidebar();
        }

        function renderSidebar() {
            chatHistoryList.innerHTML = '';
            
            // Sort by newest first
            const sortedSessions = [...sessions].sort((a, b) => b.id - a.id);
            
            sortedSessions.forEach(session => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left truncate px-3 py-2 rounded-md text-sm transition-colors ${
                    currentSessionId === session.id 
                    ? 'bg-[#e6e4df] dark:bg-[#333] text-gray-900 dark:text-white font-medium' 
                    : 'text-gray-700 dark:text-gray-300 hover:bg-[#e6e4df] dark:hover:bg-[#333]'
                }`;
                btn.textContent = session.title;
                btn.onclick = () => loadSession(session.id);
                chatHistoryList.appendChild(btn);
            });
        }

        function startNewChat() {
            currentSessionId = null;
            isFirstMessage = true;
            
            messagesWrapper.innerHTML = '';
            messagesWrapper.classList.add('hidden');
            greetingScreen.style.display = 'flex';
            setTimeout(() => greetingScreen.style.opacity = '1', 50);
            
            chatInput.value = '';
            chatInput.dispatchEvent(new Event('input'));
            chatInput.focus();
            
            renderSidebar(); // Update highlighting
            if (window.innerWidth < 768) toggleSidebar();
        }

        function loadSession(id) {
            const session = sessions.find(s => s.id === id);
            if (!session) return;

            currentSessionId = id;
            isFirstMessage = false;

            // Update UI State
            greetingScreen.style.opacity = '0';
            greetingScreen.style.display = 'none';
            messagesWrapper.innerHTML = '';
            messagesWrapper.classList.remove('hidden');

            // Render Messages
            session.messages.forEach(msg => appendMessage(msg.role, msg.content, false));

            // Disable entrance animations for restored messages
            document.querySelectorAll('.message-appear').forEach(el => {
                el.style.animation = 'none';
                el.style.opacity = '1';
                el.style.transform = 'translateY(0)';
            });
            
            renderSidebar(); // Update highlighting
            scrollToBottom();
            if (window.innerWidth < 768) toggleSidebar();
        }

        // --- Messaging ---
        function appendMessage(role, content, saveToSession = true) {
            if (saveToSession && currentSessionId) {
                const sessionIndex = sessions.findIndex(s => s.id === currentSessionId);
                if (sessionIndex !== -1) {
                    sessions[sessionIndex].messages.push({ role, content });
                    saveSessions();
                }
            }

            const msgDiv = document.createElement('div');
            msgDiv.className = 'message-appear flex gap-4 w-full';
            
            if (role === 'user') {
                msgDiv.innerHTML = `
                    <div class="ml-auto bg-[#f0f0f0] dark:bg-[#2d2d2d] px-5 py-3 rounded-2xl rounded-tr-sm max-w-[85%] text-[15px] leading-relaxed text-gray-800 dark:text-gray-200">
                        ${content.replace(/\n/g, '<br>')}
                    </div>
                `;
            } else {
                msgDiv.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-purple-500 flex items-center justify-center shrink-0 mt-0.5 shadow-sm">
                        <i data-lucide="sparkles" class="w-4 h-4 text-white"></i>
                    </div>
                    <div class="flex-1 text-[15px] leading-relaxed text-gray-800 dark:text-gray-200 prose prose-sm max-w-none pt-1">
                        ${content}
                    </div>
                `;
            }

            messagesWrapper.appendChild(msgDiv);
            lucide.createIcons();
            scrollToBottom();
        }

        function showTypingIndicator() {
            const indicator = document.createElement('div');
            indicator.id = 'typing-indicator';
            indicator.className = 'message-appear flex gap-4 w-full';
            indicator.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-purple-500 flex items-center justify-center shrink-0 mt-0.5 shadow-sm">
                    <i data-lucide="sparkles" class="w-4 h-4 text-white"></i>
                </div>
                <div class="flex items-center gap-1.5 pt-2.5 pl-1">
                    <div class="w-1.5 h-1.5 bg-indigo-400 rounded-full typing-dot"></div>
                    <div class="w-1.5 h-1.5 bg-purple-400 rounded-full typing-dot"></div>
                    <div class="w-1.5 h-1.5 bg-pink-400 rounded-full typing-dot"></div>
                </div>
            `;
            messagesWrapper.appendChild(indicator);
            lucide.createIcons();
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }

        function scrollToBottom() {
            setTimeout(() => {
                chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
            }, 50);
        }

        // --- Submit Logic ---
        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = chatInput.value.trim();
            if (!text) return;

            // Handle Session Creation on first message
            if (isFirstMessage) {
                currentSessionId = Date.now();
                const title = text.length > 30 ? text.substring(0, 30) + '...' : text;
                sessions.push({ id: currentSessionId, title: title, messages: [] });
                saveSessions();

                greetingScreen.style.opacity = '0';
                setTimeout(() => {
                    greetingScreen.style.display = 'none';
                    messagesWrapper.classList.remove('hidden');
                }, 500);
                isFirstMessage = false;
            }

            // UI Disable
            chatInput.value = '';
            chatInput.style.height = '44px';
            chatInput.disabled = true;
            submitBtn.disabled = true;

            // Send User Message
            setTimeout(() => appendMessage('user', text), isFirstMessage ? 500 : 0);

            // Typing Indicator
            setTimeout(showTypingIndicator, isFirstMessage ? 800 : 300);

            // Mock AI Response
            setTimeout(() => {
                removeTypingIndicator();
                
                const lowerText = text.toLowerCase();
                let response = "";

                if (lowerText.includes("hello") || lowerText.includes("hi")) {
                    response = "<p>Hello! I'm AxiaLM 1 Mini. How can I assist you today?</p>";
                } else if (lowerText.includes("photosynthesis")) {
                    response = `
                        <p>Photosynthesis is how plants make their own food! Here is a simple breakdown:</p>
                        <ol class="list-decimal pl-5 mt-2 space-y-1">
                            <li><strong>Sunlight:</strong> Plants absorb energy from the sun using a green pigment called chlorophyll.</li>
                            <li><strong>Water & Air:</strong> They take in water from their roots and carbon dioxide from the air.</li>
                            <li><strong>The Magic:</strong> They use the sun's energy to turn the water and carbon dioxide into sugar (glucose), which they eat to grow!</li>
                            <li><strong>Oxygen:</strong> As a bonus, they release oxygen back into the air for us to breathe.</li>
                        </ol>
                    `;
                } else if (lowerText.includes("time traveler")) {
                    response = "<p>The chronometer on Elara's wrist clicked twice, the digital readout glowing a faint azure in the dim light of the alleyway. The year was 2142 just a moment ago. Now, looking at the cobblestone street and the horse-drawn carriage passing by, she knew the jump had been successful. She was in 1888, and she had exactly 4 hours to find the missing blueprint before the timeline fractured.</p>";
                } else {
                    response = "<p>That's an interesting thought! As an AI, I'm here to help you explore that topic further. Could you provide a bit more detail on what you're looking to learn or create?</p>";
                }

                appendMessage('axia', response);
                
                chatInput.disabled = false;
                chatInput.focus();
                chatInput.dispatchEvent(new Event('input')); 

            }, (isFirstMessage ? 1000 : 500) + Math.random() * 1000);
        });

        // --- Initialization ---
        window.onload = () => {
            renderSidebar();
            
            // Auto-load most recent chat if it exists
            if (sessions.length > 0) {
                // Find the newest session
                const latestSession = [...sessions].sort((a, b) => b.id - a.id)[0];
                loadSession(latestSession.id);
            }
            
            chatInput.focus();
            submitBtn.disabled = true;
        };
    </script>
</body>
</html>
