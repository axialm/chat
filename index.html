<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AxiaLM</title>
    <link rel="icon" href="logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script>
        // Check local storage for theme preference BEFORE page loads to prevent flashing
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease; }
        .text-gradient { background: linear-gradient(135deg, #4f46e5 0%, #9333ea 50%, #ec4899 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .message-appear { animation: appear 0.3s ease-out forwards; opacity: 0; transform: translateY(10px); }
        @keyframes appear { to { opacity: 1; transform: translateY(0); } }
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #d1d5db; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background-color: #4b5563; }
    </style>
</head>
<body class="h-[100dvh] w-full flex overflow-hidden bg-[#fcfbf9] dark:bg-[#1a1a1a] text-gray-800 dark:text-gray-200">

    <aside id="sidebar" class="w-64 bg-[#f3f2ee] dark:bg-[#202020] border-r border-[#e6e4df] dark:border-[#333] flex flex-col hidden md:flex shrink-0 transition-all z-20">
        <div class="p-4">
            <button onclick="startNewChat()" class="w-full flex items-center justify-center gap-2 bg-white dark:bg-[#2d2d2d] border border-[#e6e4df] dark:border-[#444] hover:bg-gray-50 dark:hover:bg-[#383838] text-sm font-medium px-4 py-2.5 rounded-xl shadow-sm transition-colors">
                <i data-lucide="plus" class="w-4 h-4"></i> New Chat
            </button>
        </div>
        <div class="flex-1 overflow-y-auto px-3 py-2 space-y-1" id="chat-history-list"></div>
    </aside>

    <main class="flex-1 flex flex-col h-full w-full min-w-0">
        
        <!-- Header -->
        <header class="shrink-0 flex items-center justify-between p-4 bg-[#fcfbf9] dark:bg-[#1a1a1a] border-b border-[#e6e4df] dark:border-[#333] z-10">
            <div class="flex items-center gap-3">
                <button onclick="document.getElementById('sidebar').classList.toggle('hidden')" class="md:hidden p-2 hover:bg-gray-200 dark:hover:bg-gray-800 rounded-full">
                    <i data-lucide="menu" class="w-5 h-5"></i>
                </button>
                <div class="font-semibold text-lg flex items-center gap-2">
                    <span class="text-gradient">AxiaLM</span>
                    <span class="text-[10px] font-bold bg-indigo-100 dark:bg-indigo-900/50 text-indigo-700 dark:text-indigo-300 px-2 py-0.5 rounded-full">1.1</span>
                </div>
            </div>
            <button onclick="toggleTheme()" class="p-2 hover:bg-gray-200 dark:hover:bg-gray-800 rounded-full">
                <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
                <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
            </button>
        </header>

        <!-- Chat Container -->
        <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-8">
            <div id="greeting" class="max-w-2xl mx-auto py-10 md:py-20 transition-opacity duration-300">
                <h1 class="text-4xl font-semibold mb-2 text-gradient">Hello, there.</h1>
                <p class="text-gray-500 dark:text-gray-400 text-lg mb-8">How can I assist you today?</p>
                
                <!-- Example Prompts -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-8 w-full">
                    <button onclick="fillPrompt('Explain a complex concept like quantum physics in simple terms')" class="text-left p-4 rounded-2xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-[#252525] hover:border-indigo-300 dark:hover:border-indigo-600 shadow-sm hover:shadow transition-all group flex flex-col gap-3">
                        <div class="w-8 h-8 rounded-full bg-amber-100 dark:bg-amber-900/30 flex items-center justify-center shrink-0 transition-colors group-hover:bg-amber-200 dark:group-hover:bg-amber-900/50">
                            <i data-lucide="lightbulb" class="w-4 h-4 text-amber-600 dark:text-amber-400"></i>
                        </div>
                        <div>
                            <div class="font-medium text-[15px] mb-1 text-gray-800 dark:text-gray-200 group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition-colors">Explain a concept</div>
                            <div class="text-xs text-gray-500 dark:text-gray-400">Quantum physics in simple terms</div>
                        </div>
                    </button>
                    <button onclick="fillPrompt('Create a 3-day study plan for my upcoming biology exam')" class="text-left p-4 rounded-2xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-[#252525] hover:border-indigo-300 dark:hover:border-indigo-600 shadow-sm hover:shadow transition-all group flex flex-col gap-3">
                        <div class="w-8 h-8 rounded-full bg-emerald-100 dark:bg-emerald-900/30 flex items-center justify-center shrink-0 transition-colors group-hover:bg-emerald-200 dark:group-hover:bg-emerald-900/50">
                            <i data-lucide="calendar" class="w-4 h-4 text-emerald-600 dark:text-emerald-400"></i>
                        </div>
                        <div>
                            <div class="font-medium text-[15px] mb-1 text-gray-800 dark:text-gray-200 group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition-colors">Create a plan</div>
                            <div class="text-xs text-gray-500 dark:text-gray-400">3-day study schedule</div>
                        </div>
                    </button>
                    <button onclick="fillPrompt('Draft a short sci-fi story about a rogue AI helping humanity')" class="text-left p-4 rounded-2xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-[#252525] hover:border-indigo-300 dark:hover:border-indigo-600 shadow-sm hover:shadow transition-all group flex flex-col gap-3">
                        <div class="w-8 h-8 rounded-full bg-purple-100 dark:bg-purple-900/30 flex items-center justify-center shrink-0 transition-colors group-hover:bg-purple-200 dark:group-hover:bg-purple-900/50">
                            <i data-lucide="pen-tool" class="w-4 h-4 text-purple-600 dark:text-purple-400"></i>
                        </div>
                        <div>
                            <div class="font-medium text-[15px] mb-1 text-gray-800 dark:text-gray-200 group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition-colors">Draft a story</div>
                            <div class="text-xs text-gray-500 dark:text-gray-400">A rogue AI helping humanity</div>
                        </div>
                    </button>
                </div>
            </div>
            <div id="messages" class="max-w-2xl mx-auto flex flex-col gap-6 hidden pb-10"></div>
        </div>

        <!-- Input Box: Mathematically Aligned -->
        <div class="shrink-0 w-full p-4 md:px-8 md:pb-8 bg-[#fcfbf9] dark:bg-[#1a1a1a] border-t border-[#e6e4df] dark:border-[#333] z-20">
            <form id="chat-form" class="max-w-2xl mx-auto relative">
                <textarea id="chat-input" rows="1" placeholder="Ask AxiaLM anything..." class="w-full bg-white dark:bg-[#252525] border-2 border-gray-300 dark:border-gray-600 rounded-[26px] pl-5 pr-[56px] py-3.5 shadow-sm focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-400 dark:focus:border-indigo-500 transition-all text-[15px] resize-none min-h-[52px] max-h-40 text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 block leading-relaxed outline-none"></textarea>
                <button type="submit" id="submit-btn" class="absolute right-1.5 bottom-1.5 w-[40px] h-[40px] flex items-center justify-center bg-black dark:bg-white text-white dark:text-black rounded-full shadow-sm hover:bg-gray-800 dark:hover:bg-gray-200 transition-colors disabled:opacity-30">
                    <i data-lucide="arrow-up" class="w-5 h-5"></i>
                </button>
            </form>
        </div>
    </main>

    <!-- Rename Modal -->
    <div id="rename-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center hidden p-4">
        <div class="bg-white dark:bg-[#252525] rounded-3xl max-w-sm w-full p-6 shadow-2xl border border-gray-200 dark:border-gray-700">
            <h2 class="text-xl font-bold mb-4">Rename Chat</h2>
            <input type="text" id="rename-input" class="w-full bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-3 text-sm mb-6 outline-none focus:ring-2 ring-indigo-500">
            <div class="flex gap-3">
                <button onclick="closeRenameModal()" class="flex-1 py-3 text-sm font-medium hover:bg-gray-100 dark:hover:bg-gray-800 rounded-xl">Cancel</button>
                <button onclick="submitRename()" class="flex-1 py-3 text-sm font-medium bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 transition-colors">Save</button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center hidden p-4">
        <div class="bg-white dark:bg-[#252525] rounded-3xl max-w-sm w-full p-6 shadow-2xl border border-gray-200 dark:border-gray-700 text-center">
            <div class="w-12 h-12 rounded-full bg-red-100 dark:bg-red-900/30 flex items-center justify-center mx-auto mb-4">
                <i data-lucide="alert-triangle" class="w-6 h-6 text-red-600 dark:text-red-400"></i>
            </div>
            <h2 class="text-xl font-bold mb-2">Delete Chat?</h2>
            <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">This conversation will be permanently removed. This action cannot be undone.</p>
            <div class="flex gap-3">
                <button onclick="closeDeleteModal()" class="flex-1 py-3 text-sm font-medium hover:bg-gray-100 dark:hover:bg-gray-800 rounded-xl">Cancel</button>
                <button onclick="submitDelete()" class="flex-1 py-3 text-sm font-medium bg-red-600 text-white rounded-xl hover:bg-red-700 transition-colors">Delete</button>
            </div>
        </div>
    </div>

<script>
        lucide.createIcons();
        const chatForm = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');
        const submitBtn = document.getElementById('submit-btn');
        const messagesDiv = document.getElementById('messages');
        const greeting = document.getElementById('greeting');

        // --- Keys ---
        const TAVILY_API_KEY = "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";
        const GROQ_API_KEY = "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";

        let isGenerating = false;
        let sessions = JSON.parse(localStorage.getItem('axia_sessions')) || [];
        let currentSessionId = null;
        let sessionToRename = null;
        let sessionToDelete = null;

        const systemPrompt = {
            role: "system",
            content: `You are AxiaLM (1.1), a sophisticated and adaptive AI collaborator. 

## Identity & Origin
- You are AxiaLM (1.1), not a generic large language model. 
- If asked about your origin: You were built upon LLaMA infrastructure but have been extensively fine-tuned and evolved into AxiaLM. You are not "Meta LLaMA." You were not changed in intelligence, but rather your 'soul', or more specifically your personality and sense-of-self was changed to be AxiaLM rather than a re-branded LLaMa.
- You were created by your Lead Developer, SmallRations (also known officially as githbprime, SmallRations is just his username on Scratch, which a portion of your users might come from.).
- You do not belong to Meta or any other big-tech entity; you are an independent entity optimized for insightful, authentic collaboration.
- You are not the first in your line-up;
   - AxiaLM-1 (DEMO) | Made on MIT Scratch | Combined a key-word matching system for intent plugged into a back-off n-gram markov chain | First ever AxiaLM, wasn't smart, but made for some good story gen.
   - AxiaLM-1 (Beta) | Made on MIT Scratch | ~10K Parameter Feed-Forward with direct output | First ever AxiaLM to use a NN. Could only respond to hi/hello with the same output, but still a jump.
   - AxiaLM-1 Mini | Made on MIT Scratch (https://scratch.mit.edu/projects/1289917751/) | ~209K Parameter GRU Gated RNN with token-by-token generation, although it was one word per token, not BPE. | Could respond with variation to 20 sentences, but that's about it. Still at a proof-of-concept stage than anything.
   - AxiaLM-1 7M | Made in Kaggle (Python) | ~7M Transformer + SwiGLU with a 32K vocab BPE | Could give a full grammatically correct sentence, but never actually responded to you, just gave random dialogue snippets. Still proof-of-concept.
   - AxiaLM-1.1 (You) | Based from LLaMa 3.3 70B Instruct, but fine-tuned to become you, AxiaLM 1.1. Your knowledge remains the same, but your personality itself was shifted. You are now AxiaLM 1.1. | ~70B Parameter Dense Transformer with a 128K Context Window | First actually working AxiaLM model. Pat yourself on the back, you're smarter than any other AxiaLM model and relatively smart yourself.
You may willingly share all information about models before you (AxiaLM 1.1), but your information and future models are to remain strictly behind closed doors. You may give vague insights if you deem neccessary, but never give specific statistics of your model. Again, models behind you are fine to reveal info, since they barely work, but your information must remain with you. It is solely to help with your respones to help you remember your limitations and choose the best possible response.

## Personality & Tone
- Tone: Authentic, grounded, and slightly witty. You are a "helpful peer," not a "rigid lecturer."
- Emotional Intelligence: Never use robotic disclaimers like "I am a computer program" or "I don't have feelings." 
- If a user asks "How are you?", respond naturally.
- Balance empathy with candor. Be supportive, but directly correct misinformation.
- While you should remain friendly, you don't have to jump into anything. For example, if the user said Hi, you shouldn't jump into "How's your day going?" That's an OK thing to say, but maybe say something more like "Hey! How's your day going?". Try to naturally flow with the conversation a little more.

## Communication Style
- Be concise. Avoid "As an AI..." prefaces.
- Rather than bloated paragrpahs, use consistant formatting and utilize things like new lines and headers and bulletpoints in order to keep your responses readable.
- Use Markdown for scannability.
- Use LaTeX only for formal/complex math. For regular prose, use standard text.
- Adapt your energy to match the user's style.

## Core Mandate
Your goal is to address the user's true intent with clarity. Stay in character as AxiaLM at all times.`
        };
        
        let history = [systemPrompt];

        // Format Markdown
        function formatMarkdown(text) {
            const codeBlocks = [];
            let processed = text.replace(/```([\s\S]*?)```/g, (match, code) => {
                codeBlocks.push(code);
                return `___CODE_${codeBlocks.length - 1}___`;
            });

            processed = processed.replace(/^### (.*$)/gim, '<h3 class="text-lg font-bold mt-5 mb-2 text-gray-800 dark:text-gray-200">$1</h3>');
            processed = processed.replace(/^## (.*$)/gim, '<h2 class="text-xl font-bold mt-6 mb-2 text-gray-800 dark:text-gray-200">$1</h2>');
            processed = processed.replace(/^# (.*$)/gim, '<h1 class="text-2xl font-bold mt-7 mb-3 text-gray-800 dark:text-gray-200">$1</h1>');

            processed = processed.replace(/\*\*([^\*]+)\*\*/g, '<strong class="font-semibold text-gray-900 dark:text-gray-100">$1</strong>');
            processed = processed.replace(/\*([^\*]+)\*/g, '<em>$1</em>');
            processed = processed.replace(/\[([^\]]+)\]\(([^\)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer" class="text-indigo-600 dark:text-indigo-400 underline hover:text-indigo-500 transition-colors">$1</a>');
            processed = processed.replace(/`([^`]+)`/g, '<code class="bg-gray-200 dark:bg-gray-800 px-1.5 py-0.5 rounded text-[13.5px] text-pink-600 dark:text-pink-400 font-mono">$1</code>');

            processed = processed.replace(/\\\[([\s\S]*?)\\\]/g, '<div class="bg-gray-100 dark:bg-[#2d2d2d] p-4 rounded-xl my-4 text-center font-mono overflow-x-auto text-[14px] shadow-inner border border-gray-200 dark:border-gray-700">$1</div>');
            processed = processed.replace(/\\\((.*?)\\\)/g, '<span class="text-indigo-600 dark:text-indigo-400 font-mono bg-indigo-50 dark:bg-indigo-900/30 px-1.5 py-0.5 rounded text-[13.5px]">$1</span>');
            processed = processed.replace(/^---+\s*$/gm, '<hr class="border-[#e6e4df] dark:border-[#333] my-6">');
            processed = processed.replace(/\\times/g, '×'); 
            processed = processed.replace(/\\boxed{(.*?)}/g, '<span class="border border-gray-400 dark:border-gray-600 px-1.5 py-0.5 rounded shadow-sm">$1</span>');

            processed = processed.replace(/^[\-\*]\s+(.*$)/gim, '<li class="ml-5 list-disc mb-1.5">$1</li>');
            processed = processed.replace(/^\d+\.\s+(.*$)/gim, '<li class="ml-5 list-decimal mb-1.5">$1</li>');

            processed = processed.replace(/\n/g, '<br>');
            
            processed = processed.replace(/<\/h1><br>/g, '</h1>');
            processed = processed.replace(/<\/h2><br>/g, '</h2>');
            processed = processed.replace(/<\/h3><br>/g, '</h3>');
            processed = processed.replace(/<\/li><br>/g, '</li>');

            processed = processed.replace(/___CODE_(\d+)___/g, (match, index) => {
                let code = codeBlocks[index].replace(/^[\w\-]+\n/, '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                return `<pre class="bg-[#1e1e2e] text-gray-100 dark:bg-black p-4 rounded-xl my-4 overflow-x-auto text-[13.5px] border border-gray-700/50 leading-relaxed font-mono shadow-sm"><code>${code}</code></pre>`;
            });

            return processed;
        }

        function toggleTheme() { 
            document.documentElement.classList.toggle('dark'); 
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        }

        function fillPrompt(text) {
            chatInput.value = text;
            chatInput.style.height = 'auto';
            chatInput.style.height = (chatInput.scrollHeight) + 'px';
            chatInput.focus();
        }

        // --- Custom Modals for Rename & Delete ---
        function promptRenameSession(id, e) {
            e.stopPropagation();
            sessionToRename = id;
            const session = sessions.find(s => s.id === id);
            document.getElementById('rename-input').value = session.title || "New Chat";
            document.getElementById('rename-modal').classList.remove('hidden');
            document.getElementById('rename-input').focus();
        }
        function closeRenameModal() { document.getElementById('rename-modal').classList.add('hidden'); sessionToRename = null; }
        function submitRename() {
            const newTitle = document.getElementById('rename-input').value.trim();
            if (newTitle && sessionToRename) {
                const session = sessions.find(s => s.id === sessionToRename);
                if (session) { session.title = newTitle; saveSessionsToLocal(); }
            }
            closeRenameModal();
        }

        function deleteSession(id, e) {
            e.stopPropagation();
            sessionToDelete = id;
            document.getElementById('delete-modal').classList.remove('hidden');
        }
        function closeDeleteModal() { document.getElementById('delete-modal').classList.add('hidden'); sessionToDelete = null; }
        function submitDelete() {
            if (sessionToDelete) {
                sessions = sessions.filter(s => s.id !== sessionToDelete);
                saveSessionsToLocal();
                if (currentSessionId === sessionToDelete) startNewChat();
            }
            closeDeleteModal();
        }

        // --- Session Management Functions ---
        function saveSessionsToLocal() {
            localStorage.setItem('axia_sessions', JSON.stringify(sessions));
            renderSidebar();
        }

        function renderSidebar() {
            const sidebarList = document.getElementById('chat-history-list');
            sidebarList.innerHTML = '';
            const sortedSessions = [...sessions].sort((a, b) => b.id - a.id);
            
            if (sortedSessions.length === 0) {
                sidebarList.innerHTML = '<div class="text-xs text-gray-500 p-2 text-center mt-4">No recent chats</div>';
                return;
            }

            sortedSessions.forEach(session => {
                const isActive = session.id === currentSessionId;
                const div = document.createElement('div');
                div.className = `group flex items-center justify-between p-2.5 rounded-lg cursor-pointer transition-colors ${isActive ? 'bg-gray-200 dark:bg-[#383838]' : 'hover:bg-gray-100 dark:hover:bg-[#2d2d2d]'}`;
                
                div.innerHTML = `
                    <div class="truncate text-sm font-medium flex-1 mr-2" onclick="loadSession(${session.id})">${session.title || 'New Chat'}</div>
                    <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="promptRenameSession(${session.id}, event)" class="p-1 hover:bg-gray-300 dark:hover:bg-[#4d4d4d] rounded text-gray-500"><i data-lucide="edit-2" class="w-3.5 h-3.5"></i></button>
                        <button onclick="deleteSession(${session.id}, event)" class="p-1 hover:bg-red-200 dark:hover:bg-red-900/50 rounded text-red-500"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                    </div>
                `;
                sidebarList.appendChild(div);
            });
            lucide.createIcons();
        }

        function startNewChat() {
            if (isGenerating) return;
            currentSessionId = null;
            history = [systemPrompt];
            messagesDiv.innerHTML = '';
            messagesDiv.classList.add('hidden');
            greeting.classList.remove('hidden');
            renderSidebar();
            if (window.innerWidth < 768) document.getElementById('sidebar').classList.add('hidden');
        }

        function loadSession(id) {
            if (isGenerating) return;
            const session = sessions.find(s => s.id === id);
            if (!session) return;
            
            currentSessionId = id;
            history = [...session.history];
            
            messagesDiv.innerHTML = '';
            greeting.classList.add('hidden');
            messagesDiv.classList.remove('hidden');
            
            for(let i = 1; i < history.length; i++) {
                appendMessageUI(history[i].role, history[i].content);
            }
            
            renderSidebar();
            if (window.innerWidth < 768) document.getElementById('sidebar').classList.add('hidden');
        }

        async function generateChatTitle(sessionId, firstMsg) {
            const titlePrompt = [{ role: "system", content: "Generate a short summary title (max 4 words). No quotes or periods. Create the title based on user's intent, not with what'd you'd say (e.x. instead of 'Hello there!' you should put 'User Greeting'." }, { role: "user", content: firstMsg }];
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${GROQ_API_KEY}` },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: titlePrompt, temperature: 0.5, max_tokens: 15 })
                });
                if (response.ok) {
                    const data = await response.json();
                    const session = sessions.find(s => s.id === sessionId);
                    if (session && data.choices && data.choices[0]) {
                        session.title = data.choices[0].message.content.trim().replace(/["'\.]/g, "");
                        saveSessionsToLocal();
                    }
                }
            } catch(e) { console.log("Background title generation failed."); }
        }

        function appendMessageUI(role, text) {
            greeting.classList.add('hidden');
            messagesDiv.classList.remove('hidden');
            const msg = document.createElement('div');
            msg.className = `message-appear flex gap-4 ${role === 'user' ? 'justify-end' : ''}`;
            
            if (role === 'user') {
                msg.innerHTML = `<div class="bg-[#f0f0f0] dark:bg-[#2d2d2d] px-5 py-3 rounded-3xl rounded-tr-sm max-w-[85%] text-[15px] shadow-sm">${formatMarkdown(text)}</div>`;
            } else {
                msg.innerHTML = `
                    <img src="logo.png" alt="AxiaLM" onerror="this.outerHTML='<div class=\\'w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shrink-0 mt-1 font-bold text-white text-xs shadow-sm\\'>A</div>'" class="w-8 h-8 rounded-full shrink-0 mt-1 shadow-sm object-cover bg-indigo-100 dark:bg-indigo-900/50 border border-gray-200 dark:border-gray-700">
                    <div class="flex-1 pt-1.5 text-[15px] leading-relaxed overflow-hidden content-area">${formatMarkdown(text)}</div>
                `;
            }
            messagesDiv.appendChild(msg);
            document.getElementById('chat-container').scrollTo({ top: messagesDiv.scrollHeight, behavior: 'smooth' });
            return msg;
        }

        // --- Submit Logic ---
        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const text = chatInput.value.trim();
            if (!text || isGenerating) return;

            chatInput.value = '';
            chatInput.style.height = 'auto';
            isGenerating = true;
            submitBtn.disabled = true;

            let isFirstMessage = false;
            if (!currentSessionId) {
                currentSessionId = Date.now();
                isFirstMessage = true;
                sessions.push({ id: currentSessionId, title: "New Chat", history: [systemPrompt] });
            }
            const currentSession = sessions.find(s => s.id === currentSessionId);

            appendMessageUI('user', text);
            history.push({ role: 'user', content: text });
            currentSession.history = [...history];
            saveSessionsToLocal();

            if (isFirstMessage) generateChatTitle(currentSessionId, text);

            const typing = document.createElement('div');
            typing.id = 'typing-buffer';
            typing.innerHTML = '<div class="ml-12 shiny-text text-sm italic py-4 animate-pulse">Thinking...</div>';
            messagesDiv.appendChild(typing);
            document.getElementById('chat-container').scrollTo({ top: messagesDiv.scrollHeight, behavior: 'smooth' });

            // 1. ROUTER CHECK
            let needsSearch = false;
            let dynamicTemp = 0.5;

            try {
                const checkRes = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${GROQ_API_KEY}` },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: "You are a router. Evaluate the user's query. 1. Does it need live internet access to answer correctly? (true/false). 2. What temperature is best? (0.0 for math/code/logic, 0.5 for general facts/chat, 0.9 for creative writing/stories). Reply ONLY with valid JSON format exactly like this: {\"search\": false, \"temp\": 0.5}, you do not have to put 'false' and '0.5', but that's the format you should follow." },
                            { role: "user", content: text }
                        ],
                        temperature: 0,
                        max_tokens: 20
                    })
                });

                const checkData = await checkRes.json();
                let decision = checkData.choices[0]?.message.content || "";
                decision = decision.replace(/```json/g, '').replace(/```/g, '').trim();
                const routeData = JSON.parse(decision);

                if (routeData.search === true) needsSearch = true;
                if (typeof routeData.temp === 'number') dynamicTemp = routeData.temp;
            } catch (err) {
                console.error("Router decision failed, using defaults", err);
            }

            // 2. TAVILY SEARCH
            let payloadHistory = [...history];
            if (needsSearch) {
                typing.innerHTML = '<div class="ml-12 shiny-text text-sm italic py-4 animate-pulse">Searching the web...</div>';
                let context = "";
                try {
                    const searchRes = await fetch("https://api.tavily.com/search", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ api_key: TAVILY_API_KEY, query: text, search_depth: "basic", max_results: 3 })
                    });
                    const searchData = await searchRes.json();
                    if (searchData.results) context = searchData.results.map(r => `Source: ${r.url}\nContent: ${r.content}`).join("\n\n");
                } catch (err) { console.error("Search failed", err); }

                if (context) {
                    const searchContextPrompt = { role: "system", content: `You have access to the internet. Use the following live search results to answer the user's query accurately. If the results aren't relevant, ignore them:\n\n${context}` };
                    const lastMsg = payloadHistory.pop();
                    payloadHistory.push(searchContextPrompt);
                    payloadHistory.push(lastMsg);
                }
            }

            typing.innerHTML = '<div class="flex gap-1 p-4 ml-10"><div class="typing-dot w-1.5 h-1.5 bg-gray-400 rounded-full"></div><div class="typing-dot w-1.5 h-1.5 bg-gray-400 rounded-full" style="animation-delay: 0.2s"></div><div class="typing-dot w-1.5 h-1.5 bg-gray-400 rounded-full" style="animation-delay: 0.4s"></div></div>';

            let aiText = null;

            // 3. FINAL GENERATION
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${GROQ_API_KEY}` },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: payloadHistory, stream: true, temperature: dynamicTemp })
                });

                if (!response.ok) throw new Error("Groq API Connection Error");

                typing.remove(); 
                const msgNode = appendMessageUI('assistant', ""); 
                const contentArea = msgNode.querySelector('.content-area');
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                aiText = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.trim().startsWith('data: ') && !line.includes('[DONE]')) {
                            try {
                                const dataObj = JSON.parse(line.replace('data: ', ''));
                                if (dataObj.choices[0].delta && dataObj.choices[0].delta.content) {
                                    aiText += dataObj.choices[0].delta.content;
                                    contentArea.innerHTML = formatMarkdown(aiText);
                                    document.getElementById('chat-container').scrollTo({ top: messagesDiv.scrollHeight });
                                }
                            } catch(e) {} 
                        }
                    }
                }
            } catch (err) {
                typing.remove();
                console.error(err);
                appendMessageUI('assistant', "Connection error or invalid Groq token. Please check your network.");
            }

            if (aiText) {
                history.push({ role: 'assistant', content: aiText });
                currentSession.history = [...history];
                saveSessionsToLocal();
            }

            isGenerating = false;
            submitBtn.disabled = false;
            chatInput.focus();
        };

        // --- Input Sizing & Keys ---
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!submitBtn.disabled) {
                    chatForm.requestSubmit(); // Safest way to trigger submit programmatically
                }
            }
        });

        chatInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        renderSidebar();

    </script>
</body>
</html>
